name: Weekly Model Performance Check

# Run every Monday at 6 AM UTC during football season (Sept-Feb)
# This backtests the previous week's predictions against actual outcomes.

permissions:
  contents: write

on:
  schedule:
    - cron: '0 6 * 9-12,1-2 1'  # Every Monday, Sept-Dec and Jan-Feb
  workflow_dispatch:  # Allow manual trigger any time

jobs:
  backtest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: false

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run weekly backtest
        run: |
          echo "Running weekly model accuracy backtest..."
          python -c "
          from player_props.backtest import run_weekly_accuracy_check, save_accuracy_results
          results = run_weekly_accuracy_check()
          if results:
              save_accuracy_results(results)
              print('Backtest complete:', results)
          else:
              print('No backtest results returned (may be off-season or no completed games this week)')
          "
        continue-on-error: true

      - name: Upload accuracy results
        uses: actions/upload-artifact@v4
        with:
          name: model-accuracy-week-${{ github.run_number }}
          path: |
            data_files/accuracy_results_*.json
            player_props/models/model_metrics.json
          retention-days: 30

      - name: Commit accuracy results
        if: github.ref == 'refs/heads/main'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          git add data_files/accuracy_results_*.json

          if git diff --staged --quiet; then
            echo "No new accuracy results to commit"
          else
            git commit -m "Weekly model accuracy update [skip ci]"
            git push
          fi
        continue-on-error: true

      - name: Summary
        run: |
          echo "Weekly model performance check complete."
          ls -la data_files/accuracy_results_*.json 2>/dev/null || echo "No accuracy result files found."
